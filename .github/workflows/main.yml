name: Build Standalone Windows Executable

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller windnd

    - name: Build Executable with Embedded Assets
      run: |
        pyinstaller --noconsole --onefile `
          --add-data "nops.exe;." `
          --add-data "ELFSharp.dll;." `
          --add-data "nops;." `
          --add-data "comport.txt;." `
          nops_gui.py

    - name: Create Self-Signed Cert and Sign Executable
      shell: powershell
      run: |
        # Generate code-signing certificate on the runner
        $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=Nops Gui Launcher" -CertStoreLocation "Cert:\CurrentUser\My"
        
        # Digitally sign the nops_gui.exe binary
        Set-AuthenticodeSignature -FilePath "dist\nops_gui.exe" -Certificate $cert
        
        # Export the public certificate file (.cer) so you can trust it locally
        Export-Certificate -Cert $cert -FilePath "dist\NopsGuiLauncher.cer"

    - name: Upload Signed Executable & Certificate Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Nops-Gui-Launcher-Signed-x64
        path: |
          dist/nops_gui.exe
          dist/NopsGuiLauncher.cer
